<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Radar: France</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      
      <div class="ui-overlay">
        <header class="glass-panel main-header">
          <h1>✈️ Flight Radar <span class="highlight">France</span></h1>
          <p id="status-text">Connecting to OpenSky...</p>
        </header>
        
        <aside id="flight-details" class="glass-panel details-panel">
          <div class="panel-header">
            <h2>Flight Details</h2>
            <button id="close-panel" class="icon-btn">×</button>
          </div>
          <div id="details-content" class="panel-content">
            <p class="placeholder-text">Select an aircraft to view details.</p>
          </div>
        </aside>
      </div>
    </div>
    <script src="main.js" defer></script>
  </body>
</html>
